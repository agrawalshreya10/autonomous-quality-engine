name: AI Failure Analysis

on:
  workflow_run:
    workflows: ["Test Suite"]
    types: [completed]

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Require cross-workflow artifact token
        env:
          ARTIFACT_TOKEN: ${{ secrets.ACTIONS_ARTIFACT_READ_TOKEN }}
        run: |
          if [ -z "${ARTIFACT_TOKEN}" ]; then
            echo "::error::ACTIONS_ARTIFACT_READ_TOKEN is not set. Create a fine-grained PAT with Actions: Read on this repo (or a classic PAT with repo scope) and add it as this repository secret. See README and docs/decisions/ci-ai-failure-analysis.md."
            echo "## AI Analysis — missing ACTIONS_ARTIFACT_READ_TOKEN" >> $GITHUB_STEP_SUMMARY
            echo "Cross-run artifact download requires a PAT; \`GITHUB_TOKEN\` is not sufficient. See [ci-ai-failure-analysis.md](docs/decisions/ci-ai-failure-analysis.md)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      # GITHUB_TOKEN is scoped to the *current* run only. This job is triggered by
      # workflow_run, so run-id points at the failed Test Suite run — use a PAT with
      # actions:read (fine-grained) or classic repo scope. See secrets note in README.
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.ACTIONS_ARTIFACT_READ_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./artifacts

      - name: AI failure analysis
        env:
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY is not configured. Skipping AI analysis."
            echo "## AI Analysis Skipped" >> $GITHUB_STEP_SUMMARY
            echo "GEMINI_API_KEY is not configured as a repository secret." >> $GITHUB_STEP_SUMMARY
            echo "For local analysis, run:" >> $GITHUB_STEP_SUMMARY
            echo '  python -m ai_audit.failure_analyzer --artifacts-dir ./artifacts' >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          # Mask the API key in logs
          echo "::add-mask::${GEMINI_API_KEY}"
          
          # Prefer smoke-report before test-report-*: when smoke fails but the matrix job
          # passes, the matrix artifact has empty failures.txt and failure_analyzer exits 1.
          # Try each downloaded artifact until one yields parseable failures (exit 0).
          analysis_ok=0
          for artifact_dir in artifacts/smoke-report artifacts/test-report-*; do
            [ -d "$artifact_dir" ] || continue
            echo "Trying AI analysis for: $artifact_dir"
            set +e
            python -m ai_audit.failure_analyzer \
              --client gemini \
              --model gemini-2.5-flash \
              --artifacts-dir "$artifact_dir" \
              --out ai_suggestions_raw.md
            rc=$?
            set -e
            if [ "$rc" -eq 0 ] && [ -f ai_suggestions_raw.md ]; then
              analysis_ok=1
              break
            fi
            echo "No parseable failures in $artifact_dir (analyzer exit $rc); trying next artifact if any."
          done
          
          if [ "$analysis_ok" -eq 1 ]; then
            sed -E \
              -e 's/(AIza[0-9A-Za-z_-]{20,})/[REDACTED_GEMINI_KEY]/g' \
              -e 's/([A-Za-z0-9_]*(SECRET|TOKEN|PASSWORD|PASS|API_KEY)[A-Za-z0-9_]*[[:space:]]*[:=][[:space:]]*)[^[:space:]]+/\1[REDACTED]/Ig' \
              -e 's/(Bearer[[:space:]]+)[A-Za-z0-9._-]+/\1[REDACTED]/g' \
              ai_suggestions_raw.md > ai_suggestions_redacted.md
            
            echo "## AI Failure Analysis" >> $GITHUB_STEP_SUMMARY
            echo "Analysis of failed Test Suite run #${{ github.event.workflow_run.run_number }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ai_suggestions_redacted.md >> $GITHUB_STEP_SUMMARY
            echo "AI analysis completed and published to job summary"
            exit 0
          fi
          
          echo "## AI Analysis — no parseable failures" >> $GITHUB_STEP_SUMMARY
          echo "None of the downloaded artifacts contained failures the analyzer could read (empty matrix run vs failed smoke is common). Ensure \`reports/failures.txt\` or \`reports/report.html\` is present in the artifact from the failing job." >> $GITHUB_STEP_SUMMARY
          echo "For local analysis: \`python -m ai_audit.failure_analyzer --client gemini --artifacts-dir ./path/to/reports\`" >> $GITHUB_STEP_SUMMARY
          exit 0
